[bar/mybar]
width = 100%
height = 30
background = #222831
foreground = #eeeeee
font-0 = "JetBrains Mono Nerd Font:size=10;2"
font-1 = "Font Awesome 6 Free:size=10;2"

; Place bar at the top
override-redirect = true
wm-restack = i3
monitor = None-1
padding-left = 10
padding-right = 10

modules-left = i3 workspaces temp
modules-center = date
modules-right = volume memory cpu gpu wifi battery power username

; tray position (for nm-applet, volume, etc)
tray-position = right
tray-padding = 2

; prevent bar overlapping with windows (requires i3 gaps or reserved space)
; Uncomment if needed
; override-redirect = false
; bottom = false

; Use click-events if you want interactivity
click-events = true

[module/i3]
type = internal/i3
format = <label-state> <label-mode> <label-layout>
label-focused = %name%
label-focused-background = #00adb5
label-focused-underline = #00adb5
label-unfocused = %name%
label-visible = %name%
label-visible-underline = #00adb5
label-urgent = %name%
label-urgent-background = #ff5722
label-urgent-underline = #ff5722
index-sort = true

[module/workspaces]
type = internal/i3
; same as above (you can merge i3 and workspaces if you want)
format = <label-state>
label-focused = %name%
label-focused-background = #00adb5
label-unfocused = %name%

[module/date]
type = internal/date
format = "%a %b %d  %H:%M:%S"
interval = 1

[module/volume]
type = internal/volume
format-volume = "  %volume%%"
format-muted = "婢 muted"
format = <label>
; Adjust sink if needed
; sink = your_sink_name

[module/memory]
type = internal/memory
format = " %used%/%total% MB"
interval = 5

[module/cpu]
type = internal/cpu
format = " %usage%%"
interval = 3

[module/gpu]
type = custom/script
exec = "nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits || echo '0'"
interval = 5
format-prefix = " "
format = "{output}%"
format-underline = #00adb5

[module/wifi]
type = internal/network
interface = wlan0
format-connected = " %essid%"
format-disconnected = " no wifi"
format-underline = #00adb5

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
format-charging = " %percentage%%"
format-discharging = " %percentage%%"
format-full = " %percentage%%"
format = <label>
interval = 30

[module/power]
type = custom/script
exec = ~/.local/bin/powermenu
interval = 0
click-left = ~/.local/bin/powermenu

[module/username]
type = custom/script
exec = "whoami"
interval = 60

[module/temp]
type = custom/script
exec = sensors | grep 'Package id 0:' | awk '{print "🌡 " $4}'
interval = 10
format = <label>
